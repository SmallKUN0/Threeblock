<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>坤坤工作室启动器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #90EE90;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #main-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 18vh;
            position: relative;
        }

        .title {
            color: #FFFFFF;
            font-size: 2.2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255,255,255,0.9), 0 0 40px rgba(255,255,255,0.6);
            line-height: 1.3;
            user-select: none;
            -webkit-user-select: none;
        }

        .title .emoji-fire {
            filter: brightness(3) saturate(0) drop-shadow(0 0 8px #FFFFFF) drop-shadow(0 0 16px #FFFFFF);
            display: inline-block;
        }

        .version-select-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid #FFFFFF;
            color: #FFFFFF;
            font-size: 1.1rem;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            outline: none;
            margin-bottom: 25px;
            height: 48px;
            line-height: 1;
            appearance: none;
            -webkit-appearance: none;
            text-align: center;
            text-align-last: center;
            min-width: 180px;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .version-select-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .version-select-btn:active {
            background: rgba(255,255,255,0.4);
            transform: scale(0.96);
        }

        .launch-btn {
            background: rgba(255,255,255,0.08);
            border: 2px solid #FFFFFF;
            color: #FFFFFF;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 12px 50px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            height: 48px;
            line-height: 1;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .launch-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .launch-btn:active {
            background: rgba(255,255,255,0.4);
            transform: scale(0.96);
        }

        .copyright-text {
            color: #FFFFFF;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 20px;
            text-shadow: 0 0 12px rgba(255,255,255,0.9);
            user-select: none;
            -webkit-user-select: none;
            opacity: 0.9;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #90EE90;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 100;
        }

        #loading-screen.show {
            opacity: 1;
        }

        .studio-name {
            color: #FFFFFF;
            font-size: 2.8rem;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255,255,255,1), 0 0 60px rgba(255,255,255,0.7);
            margin-bottom: 25px;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .loading-text {
            color: #FFFFFF;
            font-size: 1.15rem;
            text-shadow: 0 0 12px rgba(255,255,255,0.9);
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 50;
            background: #000;
        }

        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        #float-ball {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 2px solid #FFFFFF;
            color: #FFFFFF;
            font-size: 0.85rem;
            font-weight: bold;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            z-index: 200;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            line-height: 1.2;
            padding: 4px;
        }

        #float-ball.dragging {
            opacity: 0.8;
            cursor: grabbing;
        }

        #confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        .modal-content {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 30px 40px;
            text-align: center;
            min-width: 260px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .modal-text {
            color: #333;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .modal-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-btn {
            padding: 10px 30px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            height: 42px;
            line-height: 1;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .btn-yes {
            background: #ff4444;
            color: #FFFFFF;
        }

        .btn-yes:hover {
            background: #ff2222;
        }

        .btn-no {
            background: #e0e0e0;
            color: #333;
        }

        .btn-no:hover {
            background: #d0d0d0;
        }

        /* 更新提示弹窗 */
        #update-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 400;
        }

        .update-modal-content {
            background: #FFFFFF;
            border: 2px solid #000000;
            border-radius: 16px;
            padding: 30px 40px;
            text-align: center;
            max-width: 320px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .update-modal-text {
            color: #000000;
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .update-modal-btn {
            padding: 10px 30px;
            border-radius: 8px;
            border: 2px solid #000000;
            background: #FFFFFF;
            color: #000000;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            height: 42px;
            line-height: 1;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .update-modal-btn:hover {
            background: #000000;
            color: #FFFFFF;
        }

        /* 右上角按钮区域 */
        .top-right-btns {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-end;
            z-index: 10;
        }

        .top-right-btn {
            background: rgba(255,255,255,0.15);
            border: 2px solid #FFFFFF;
            color: #FFFFFF;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .top-right-btn:hover {
            background: rgba(255,255,255,0.35);
        }

        .top-right-btn:active {
            background: rgba(255,255,255,0.5);
            transform: scale(0.96);
        }

        /* 自定义版本选择界面 */
        #version-picker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #90EE90;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 500;
            overflow: hidden;
        }

        .picker-cancel-btn {
            background: rgba(255,255,255,0.15);
            border: 2px solid #FFFFFF;
            color: #FFFFFF;
            font-size: 1rem;
            font-weight: 600;
            padding: 10px 30px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            margin-bottom: 15px;
            transition: all 0.15s ease;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .picker-cancel-btn:hover {
            background: rgba(255,255,255,0.35);
        }

        .picker-cancel-btn:active {
            background: rgba(255,255,255,0.5);
            transform: scale(0.96);
        }

        .picker-scroll-area {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 0 20px 40px 20px;
        }

        .picker-option {
            color: #FFFFFF;
            font-size: 1.1rem;
            font-weight: 500;
            text-align: center;
            padding: 16px 20px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            position: relative;
            text-shadow: 0 0 8px rgba(255,255,255,0.7);
            transition: background 0.1s;
        }

        .picker-option:active {
            background: rgba(255,255,255,0.15);
        }

        .picker-option.selected {
            background: rgba(255,255,255,0.2);
        }

        .picker-divider {
            width: 80%;
            height: 1px;
            background: rgba(255,255,255,0.6);
            margin: 0 auto;
            box-shadow: 0 0 4px rgba(255,255,255,0.5);
        }

        /* 资源加载界面 */
        #resource-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #90EE90;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 600;
        }

        .loader-cancel-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.15);
            border: 2px solid #FFFFFF;
            color: #FFFFFF;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .loader-cancel-btn:hover {
            background: rgba(255,255,255,0.35);
        }

        .loader-cancel-btn:active {
            background: rgba(255,255,255,0.5);
            transform: scale(0.96);
        }

        .loader-title {
            color: #FFFFFF;
            font-size: 1.3rem;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255,255,255,0.9), 0 0 40px rgba(255,255,255,0.6);
            margin-bottom: 30px;
            user-select: none;
            -webkit-user-select: none;
            text-align: center;
        }

        .progress-container {
            width: 80%;
            max-width: 400px;
            height: 20px;
            background: rgba(255,255,255,0.2);
            border: 2px solid #FFFFFF;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #FFFFFF;
            border-radius: 8px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        .loader-current-text {
            color: #FFFFFF;
            font-size: 1rem;
            text-shadow: 0 0 12px rgba(255,255,255,0.9);
            user-select: none;
            -webkit-user-select: none;
            text-align: center;
            min-height: 1.5em;
        }
    </style>
</head>
<body>

    <div id="main-screen">
        <div class="top-right-btns">
            <button class="top-right-btn" id="clearCacheBtn">清理缓存</button>
            <button class="top-right-btn" id="loadResourceBtn">加载资源</button>
        </div>
        <div class="title">Sodium <span class="emoji-fire">🔥</span> 方块 启动器 2.0</div>
        <div class="version-select-btn" id="versionSelectBtn">1.5.5</div>
        <button class="launch-btn" id="launchBtn">启动</button>
        <div class="copyright-text">版权所有：坤坤工作室/团体   禁止二次分发</div>
    </div>

    <div id="loading-screen">
        <div class="studio-name">🏀坤坤工作室</div>
        <div class="loading-text" id="loadingText">检查依赖……</div>
    </div>

    <div id="game-container">
        <iframe id="game-frame" sandbox="allow-scripts allow-same-origin allow-pointer-lock"></iframe>
    </div>

    <div id="float-ball">长按<br>退出</div>

    <div id="confirm-modal">
        <div class="modal-content">
            <div class="modal-text">是否退出</div>
            <div class="modal-btns">
                <button class="modal-btn btn-yes" id="btnYes">是</button>
                <button class="modal-btn btn-no" id="btnNo">否</button>
            </div>
        </div>
    </div>

    <!-- 更新提示弹窗 -->
    <div id="update-modal">
        <div class="update-modal-content">
            <div class="update-modal-text">欢迎！ 本次更新了 1.56版 ，新增了下界！还有三个番外游戏 溶洞2.0 、 后室 1.4 和 解压打球 3.0 希望你玩得开心</div>
            <button class="update-modal-btn" id="updateBtn">开始体验</button>
        </div>
    </div>

    <!-- 自定义版本选择界面 -->
    <div id="version-picker">
        <button class="picker-cancel-btn" id="pickerCancelBtn">取消</button>
        <div class="picker-scroll-area" id="pickerScrollArea">
        </div>
    </div>

    <!-- 资源加载界面 -->
    <div id="resource-loader">
        <button class="loader-cancel-btn" id="loaderCancelBtn">取消</button>
        <div class="loader-title">正在加载PNG资源……</div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="loader-current-text" id="loaderCurrentText"></div>
    </div>

    <script>
        const versionSelectBtn = document.getElementById('versionSelectBtn');
        const launchBtn = document.getElementById('launchBtn');
        const mainScreen = document.getElementById('main-screen');
        const loadingScreen = document.getElementById('loading-screen');
        const loadingText = document.getElementById('loadingText');
        const gameContainer = document.getElementById('game-container');
        const gameFrame = document.getElementById('game-frame');
        const floatBall = document.getElementById('float-ball');
        const confirmModal = document.getElementById('confirm-modal');
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const updateModal = document.getElementById('update-modal');
        const updateBtn = document.getElementById('updateBtn');
        const clearCacheBtn = document.getElementById('clearCacheBtn');
        const loadResourceBtn = document.getElementById('loadResourceBtn');
        const versionPicker = document.getElementById('version-picker');
        const pickerCancelBtn = document.getElementById('pickerCancelBtn');
        const pickerScrollArea = document.getElementById('pickerScrollArea');
        const resourceLoader = document.getElementById('resource-loader');
        const loaderCancelBtn = document.getElementById('loaderCancelBtn');
        const progressBar = document.getElementById('progressBar');
        const loaderCurrentText = document.getElementById('loaderCurrentText');

        const versionFiles = {
            '1.5.5': 'Three1.5.5.html',
            '1.5': 'Three1.5.html',
            '1.4': 'Three1.4.html',
            '1.2': 'Three1.2.html',
            '1.5.6': 'Three1.5.6.html',
            '番外-溶洞2.0': 'Cave2.0.html',
            '番外-后室1.4': 'backrooms1.4.html',
            '番外-解压打击球': 'hurtkimi3.0.html'
        };

        const versionOptions = [
            '1.5.5', '1.5', '1.4', '1.2',
            '1.5.6', '番外-溶洞2.0', '番外-后室1.4', '番外-解压打击球'
        ];

        let currentVersion = '1.5.5';
        let isLaunching = false;
        let loaderCancelled = false;

        // 检查更新提示
        function checkUpdateNotice() {
            try {
                if (!localStorage.getItem('2.0更新提示已通知')) {
                    updateModal.style.display = 'flex';
                }
            } catch (e) {}
        }

        // 更新提示按钮
        function onUpdateBtnClick(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            try {
                localStorage.setItem('2.0更新提示已通知', 'true');
            } catch (e) {}
            updateModal.style.display = 'none';
        }

        updateBtn.addEventListener('click', onUpdateBtnClick);
        updateBtn.addEventListener('mousedown', onUpdateBtnClick);
        updateBtn.addEventListener('touchstart', onUpdateBtnClick, { passive: false });

        // 清理缓存
        function onClearCache(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            try {
                localStorage.clear();
            } catch (e) {}
            // 显示清理成功弹窗（和更新弹窗一样样式）
            const successModal = document.createElement('div');
            successModal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:700;';
            successModal.innerHTML = '<div style="background:#FFFFFF;border:2px solid #000000;border-radius:16px;padding:30px 40px;text-align:center;max-width:320px;box-shadow:0 10px 40px rgba(0,0,0,0.3);"><div style="color:#000000;font-size:1.1rem;font-weight:500;margin-bottom:25px;line-height:1.6;">缓存清理成功</div><button id="successCloseBtn" style="padding:10px 30px;border-radius:8px;border:2px solid #000000;background:#FFFFFF;color:#000000;font-size:1rem;font-weight:600;cursor:pointer;transition:all 0.15s;height:42px;line-height:1;user-select:none;-webkit-user-select:none;touch-action:manipulation;">确定</button></div>';
            document.body.appendChild(successModal);
            const closeBtn = document.getElementById('successCloseBtn');
            function closeSuccess() {
                successModal.remove();
            }
            closeBtn.addEventListener('click', closeSuccess);
            closeBtn.addEventListener('mousedown', closeSuccess);
            closeBtn.addEventListener('touchstart', function(ev) { ev.preventDefault(); closeSuccess(); }, { passive: false });
        }

        clearCacheBtn.addEventListener('click', onClearCache);
        clearCacheBtn.addEventListener('mousedown', onClearCache);
        clearCacheBtn.addEventListener('touchstart', onClearCache, { passive: false });

        // 构建版本选择界面
        function buildVersionPicker() {
            pickerScrollArea.innerHTML = '';
            versionOptions.forEach((opt, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'picker-option';
                optionDiv.textContent = opt;
                optionDiv.dataset.value = opt;
                if (opt === currentVersion) {
                    optionDiv.classList.add('selected');
                }
                pickerScrollArea.appendChild(optionDiv);
                if (index < versionOptions.length - 1) {
                    const divider = document.createElement('div');
                    divider.className = 'picker-divider';
                    pickerScrollArea.appendChild(divider);
                }
            });
        }

        // 版本选择界面交互
        let pickerTouchState = {
            startTime: 0,
            startY: 0,
            isScrolling: false,
            targetOption: null
        };

        pickerScrollArea.addEventListener('touchstart', function(e) {
            const touch = e.touches[0];
            pickerTouchState.startTime = Date.now();
            pickerTouchState.startY = touch.clientY;
            pickerTouchState.isScrolling = false;
            const target = e.target.closest('.picker-option');
            pickerTouchState.targetOption = target ? target.dataset.value : null;
        }, { passive: true });

        pickerScrollArea.addEventListener('touchmove', function(e) {
            const touch = e.touches[0];
            const dy = Math.abs(touch.clientY - pickerTouchState.startY);
            if (dy > 10) {
                pickerTouchState.isScrolling = true;
            }
        }, { passive: true });

        pickerScrollArea.addEventListener('touchend', function(e) {
            const elapsed = Date.now() - pickerTouchState.startTime;
            if (!pickerTouchState.isScrolling && elapsed < 200 && pickerTouchState.targetOption) {
                e.preventDefault();
                currentVersion = pickerTouchState.targetOption;
                versionSelectBtn.textContent = currentVersion;
                versionPicker.style.display = 'none';
            }
        });

        pickerScrollArea.addEventListener('mousedown', function(e) {
            const target = e.target.closest('.picker-option');
            if (!target) return;
            pickerTouchState.startTime = Date.now();
            pickerTouchState.startY = e.clientY;
            pickerTouchState.isScrolling = false;
            pickerTouchState.targetOption = target.dataset.value;
        });

        pickerScrollArea.addEventListener('mousemove', function(e) {
            const dy = Math.abs(e.clientY - pickerTouchState.startY);
            if (dy > 10) {
                pickerTouchState.isScrolling = true;
            }
        });

        pickerScrollArea.addEventListener('mouseup', function(e) {
            const elapsed = Date.now() - pickerTouchState.startTime;
            if (!pickerTouchState.isScrolling && elapsed < 200 && pickerTouchState.targetOption) {
                currentVersion = pickerTouchState.targetOption;
                versionSelectBtn.textContent = currentVersion;
                versionPicker.style.display = 'none';
            }
        });

        pickerScrollArea.addEventListener('click', function(e) {
            const target = e.target.closest('.picker-option');
            if (!target) return;
            const elapsed = Date.now() - pickerTouchState.startTime;
            if (!pickerTouchState.isScrolling && elapsed < 200) {
                currentVersion = target.dataset.value;
                versionSelectBtn.textContent = currentVersion;
                versionPicker.style.display = 'none';
            }
        });

        // 滚轮支持
        pickerScrollArea.addEventListener('wheel', function(e) {
            // 允许默认滚轮行为
        }, { passive: true });

        function openVersionPicker(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            buildVersionPicker();
            versionPicker.style.display = 'flex';
        }

        function closeVersionPicker(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            versionPicker.style.display = 'none';
        }

        versionSelectBtn.addEventListener('click', openVersionPicker);
        versionSelectBtn.addEventListener('mousedown', openVersionPicker);
        versionSelectBtn.addEventListener('touchstart', openVersionPicker, { passive: false });

        pickerCancelBtn.addEventListener('click', closeVersionPicker);
        pickerCancelBtn.addEventListener('mousedown', closeVersionPicker);
        pickerCancelBtn.addEventListener('touchstart', closeVersionPicker, { passive: false });

        // 资源加载
        const textureList = [
            { file: 'dirt.png', name: '土块' },
            { file: 'stone.png', name: '石头' },
            { file: 'bedrock.png', name: '基岩' },
            { file: 'oak_log.png', name: '橡木原木' },
            { file: 'oak_log_top.png', name: '橡木原木顶面' },
            { file: 'netherrack.png', name: '下界岩' },
            { file: 'warped_stem.png', name: '诡异菌柄' },
            { file: 'warped_stem_top.png', name: '诡异菌柄顶面' },
            { file: 'crimson_stem.png', name: '绯红菌柄' },
            { file: 'crimson_stem_top.png', name: '绯红菌柄顶面' },
            { file: 'warped_wart_block.png', name: '诡异树叶' },
            { file: 'nether_wart_block.png', name: '绯红树叶' },
            { file: 'warped_nylium.png', name: '诡异菌岩' },
            { file: 'warped_nylium_side.png', name: '诡异菌岩侧面' },
            { file: 'crimson_nylium.png', name: '绯红菌岩' },
            { file: 'crimson_nylium_side.png', name: '绯红菌岩侧面' },
            { file: 'obsidian.png', name: '黑曜石' },
            { file: 'tnt_side.png', name: 'TNT' },
            { file: 'tnt_top.png', name: 'TNT顶面' },
            { file: 'tnt_bottom.png', name: 'TNT底面' },
            { file: 'oak_leaves.png', name: '橡树树叶' },
            { file: 'grass_block_top.png', name: '草方块顶面' },
            { file: 'grass_block_side.png', name: '草方块侧面' },
            { file: 'end_stone.png', name: '末地石' }
        ];

        const BASE_URL = 'https://cdn.jsdmirror.com/gh/Faithful-Pack/Default-Java@1.21.11/assets/minecraft/textures/block/';

        async function loadResources() {
            loaderCancelled = false;
            resourceLoader.style.display = 'flex';
            progressBar.style.width = '0%';
            loaderCurrentText.textContent = '';

            const total = textureList.length;
            let completed = 0;

            for (let i = 0; i < total; i++) {
                if (loaderCancelled) break;

                const item = textureList[i];
                loaderCurrentText.textContent = item.name;

                try {
                    const url = BASE_URL + item.file;
                    const response = await fetch(url);
                    if (response.ok) {
                        const blob = await response.blob();
                        const reader = new FileReader();
                        await new Promise((resolve) => {
                            reader.onloadend = function() {
                                try {
                                    localStorage.setItem('tex_' + item.file, reader.result);
                                } catch (e) {}
                                resolve();
                            };
                            reader.readAsDataURL(blob);
                        });
                    }
                } catch (e) {}

                completed++;
                progressBar.style.width = (completed / total * 100) + '%';
            }

            if (!loaderCancelled) {
                loaderCurrentText.textContent = '加载完成';
                setTimeout(() => {
                    resourceLoader.style.display = 'none';
                }, 500);
            }
        }

        function onLoadResource(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            loadResources();
        }

        function onLoaderCancel(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            loaderCancelled = true;
            resourceLoader.style.display = 'none';
        }

        loadResourceBtn.addEventListener('click', onLoadResource);
        loadResourceBtn.addEventListener('mousedown', onLoadResource);
        loadResourceBtn.addEventListener('touchstart', onLoadResource, { passive: false });

        loaderCancelBtn.addEventListener('click', onLoaderCancel);
        loaderCancelBtn.addEventListener('mousedown', onLoaderCancel);
        loaderCancelBtn.addEventListener('touchstart', onLoaderCancel, { passive: false });

        function resetToMain() {
            gameFrame.src = '';
            gameContainer.style.display = 'none';
            floatBall.style.display = 'none';
            loadingScreen.style.display = 'none';
            loadingScreen.classList.remove('show');
            mainScreen.style.display = 'flex';
            isLaunching = false;
        }

        function handleLaunch(e) {
            if (isLaunching) return;
            isLaunching = true;
            if (e && e.type === 'touchstart') e.preventDefault();

            mainScreen.style.display = 'none';
            loadingScreen.style.display = 'flex';
            void loadingScreen.offsetWidth;
            loadingScreen.classList.add('show');

            const version = currentVersion;

            setTimeout(() => {
                loadingText.textContent = '检查依赖……（随后3s后开始正转）';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    loadingScreen.classList.remove('show');

                    const file = versionFiles[version];
                    if (file) {
                        gameFrame.src = file;
                        gameContainer.style.display = 'block';
                        floatBall.style.display = 'flex';
                    }
                }, 3000);
            }, 50);
        }

        launchBtn.addEventListener('click', handleLaunch);
        launchBtn.addEventListener('mousedown', handleLaunch);
        launchBtn.addEventListener('touchstart', handleLaunch, { passive: false });

        // 悬浮球拖动 + 长按/点击
        let dragState = {
            isDragging: false,
            startX: 0, startY: 0,
            ballLeft: 0, ballTop: 0,
            startTime: 0,
            hasMoved: false,
            longPressTimer: null
        };

        const LONG_PRESS_TIME = 800;
        const MOVE_THRESHOLD = 10;

        function getClientPos(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function onBallDown(e) {
            e.preventDefault();
            e.stopPropagation();
            const pos = getClientPos(e);
            const rect = floatBall.getBoundingClientRect();

            dragState.isDragging = true;
            dragState.hasMoved = false;
            dragState.startX = pos.x;
            dragState.startY = pos.y;
            dragState.ballLeft = rect.left;
            dragState.ballTop = rect.top;
            dragState.startTime = Date.now();

            floatBall.classList.add('dragging');

            dragState.longPressTimer = setTimeout(() => {
                if (dragState.isDragging && !dragState.hasMoved) {
                    dragState.isDragging = false;
                    floatBall.classList.remove('dragging');
                    resetToMain();
                }
            }, LONG_PRESS_TIME);
        }

        function onBallMove(e) {
            if (!dragState.isDragging) return;
            const pos = getClientPos(e);
            const dx = pos.x - dragState.startX;
            const dy = pos.y - dragState.startY;

            if (Math.abs(dx) > MOVE_THRESHOLD || Math.abs(dy) > MOVE_THRESHOLD) {
                dragState.hasMoved = true;
                if (dragState.longPressTimer) {
                    clearTimeout(dragState.longPressTimer);
                    dragState.longPressTimer = null;
                }
            }

            floatBall.style.left = (dragState.ballLeft + dx) + 'px';
            floatBall.style.top = (dragState.ballTop + dy) + 'px';
            floatBall.style.transform = 'none';
        }

        function onBallUp(e) {
            if (!dragState.isDragging) return;

            if (dragState.longPressTimer) {
                clearTimeout(dragState.longPressTimer);
                dragState.longPressTimer = null;
            }

            const wasDragging = dragState.isDragging;
            dragState.isDragging = false;
            floatBall.classList.remove('dragging');

            if (wasDragging && !dragState.hasMoved && (Date.now() - dragState.startTime < LONG_PRESS_TIME)) {
                confirmModal.style.display = 'flex';
            }
        }

        floatBall.addEventListener('mousedown', onBallDown);
        floatBall.addEventListener('touchstart', onBallDown, { passive: false });

        document.addEventListener('mousemove', onBallMove);
        document.addEventListener('touchmove', onBallMove, { passive: false });

        document.addEventListener('mouseup', onBallUp);
        document.addEventListener('touchend', onBallUp);

        // 弹窗按钮
        function onYes(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            confirmModal.style.display = 'none';
            resetToMain();
        }

        function onNo(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            confirmModal.style.display = 'none';
        }

        btnYes.addEventListener('click', onYes);
        btnYes.addEventListener('mousedown', onYes);
        btnYes.addEventListener('touchstart', onYes, { passive: false });

        btnNo.addEventListener('click', onNo);
        btnNo.addEventListener('mousedown', onNo);
        btnNo.addEventListener('touchstart', onNo, { passive: false });

        // 页面加载时检查更新提示
        checkUpdateNotice();
    </script>
</body>
</html>
